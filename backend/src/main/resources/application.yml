spring:
  application:
    name: music-dashboard

  datasource:
    url: jdbc:postgresql://localhost:5432/musicdashboard
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

yandex:
  client-id: ${YANDEX_CLIENT_ID}
  client-secret: ${YANDEX_CLIENT_SECRET}
  redirect-uri: ${YANDEX_REDIRECT_URI:http://localhost:8080/api/auth/yandex/callback}
  auth-url: https://oauth.yandex.ru/authorize
  token-url: https://oauth.yandex.ru/token
  user-info-url: https://login.yandex.ru/info
  music-api-url: https://api.music.yandex.net

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.musicdashboard: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
