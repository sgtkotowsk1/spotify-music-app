version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: musicdashboard-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-musicdashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - musicdashboard-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: musicdashboard-backend
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-musicdashboard}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - musicdashboard-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: musicdashboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - musicdashboard-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  musicdashboard-net:
    driver: bridge
